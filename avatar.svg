<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 540" width="520" height="540">
  <defs>
    <style>
      @keyframes spin-slow { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
      @keyframes spin-rev  { from{transform:rotate(0deg)} to{transform:rotate(-360deg)} }
      @keyframes float-1   { 0%,100%{transform:translateY(0px);opacity:.8}  50%{transform:translateY(-10px);opacity:1} }
      @keyframes float-2   { 0%,100%{transform:translateY(0px);opacity:.6}  50%{transform:translateY(9px);opacity:1} }
      @keyframes float-3   { 0%,100%{transform:translateY(-5px);opacity:.7} 50%{transform:translateY(5px);opacity:1} }
      @keyframes dot-orbit  { from{transform:rotate(0deg)   translateX(138px) rotate(0deg)}
                               to  {transform:rotate(360deg) translateX(138px) rotate(-360deg)} }
      @keyframes dot-orbit2 { from{transform:rotate(120deg) translateX(138px) rotate(-120deg)}
                               to  {transform:rotate(480deg) translateX(138px) rotate(-480deg)} }
      @keyframes dot-orbit3 { from{transform:rotate(240deg) translateX(138px) rotate(-240deg)}
                               to  {transform:rotate(600deg) translateX(138px) rotate(-600deg)} }
      @keyframes pulse-ring { 0%,100%{opacity:.35} 50%{opacity:.8} }
      .sg  { transform-origin:260px 255px; animation:spin-slow 12s linear infinite }
      .sr  { transform-origin:260px 255px; animation:spin-rev  18s linear infinite }
      .sg2 { transform-origin:260px 255px; animation:spin-slow 28s linear infinite }
      .t1  { animation:float-1 3.2s ease-in-out infinite }
      .t2  { animation:float-2 4.1s ease-in-out infinite }
      .t3  { animation:float-3 3.7s ease-in-out infinite }
      .t4  { animation:float-1 5s   ease-in-out infinite reverse }
      .t5  { animation:float-2 4.5s ease-in-out infinite reverse }
      .t6  { animation:float-3 3s   ease-in-out infinite }
      .d1  { transform-origin:260px 255px; animation:dot-orbit  6s linear infinite }
      .d2  { transform-origin:260px 255px; animation:dot-orbit2 6s linear infinite }
      .d3  { transform-origin:260px 255px; animation:dot-orbit3 6s linear infinite }
      text { font-family:-apple-system,'SF Pro Display','Helvetica Neue',Arial,sans-serif }
    </style>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0071e3"/>
      <stop offset="50%"  stop-color="#5ac8fa"/>
      <stop offset="100%" stop-color="#5856D6"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#5856D6" stop-opacity=".7"/>
      <stop offset="100%" stop-color="#34C759" stop-opacity=".7"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gs" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#0071e3" stop-opacity="0.18"/>
      <stop offset="60%"  stop-color="#0071e3" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0071e3" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- dark background -->
  <rect width="520" height="540" fill="#0a0a0f"/>

  <!-- outer halo -->
  <circle cx="260" cy="255" r="195" fill="none" stroke="#0071e3" stroke-width="1" stroke-dasharray="4 8" opacity="0.15">
    <animate attributeName="stroke-dashoffset" from="0" to="96" dur="8s" repeatCount="indefinite"/>
  </circle>

  <!-- slow outer ring -->
  <g class="sg2">
    <circle cx="260" cy="255" r="173" fill="none" stroke="url(#g2)" stroke-width="1.5" stroke-dasharray="6 14" opacity="0.3"/>
  </g>

  <!-- reverse ring with ticks -->
  <g class="sr">
    <circle cx="260" cy="255" r="152" fill="none" stroke="url(#g1)" stroke-width="2" stroke-dasharray="3 9" opacity="0.4"/>
    <line x1="260" y1="104" x2="260" y2="96"  stroke="#5ac8fa" stroke-width="2" opacity="0.7"/>
    <line x1="260" y1="104" x2="260" y2="96"  stroke="#5ac8fa" stroke-width="2" opacity="0.7" transform="rotate(60,260,255)"/>
    <line x1="260" y1="104" x2="260" y2="96"  stroke="#5ac8fa" stroke-width="2" opacity="0.7" transform="rotate(120,260,255)"/>
    <line x1="260" y1="104" x2="260" y2="96"  stroke="#5ac8fa" stroke-width="2" opacity="0.7" transform="rotate(180,260,255)"/>
    <line x1="260" y1="104" x2="260" y2="96"  stroke="#5ac8fa" stroke-width="2" opacity="0.7" transform="rotate(240,260,255)"/>
    <line x1="260" y1="104" x2="260" y2="96"  stroke="#5ac8fa" stroke-width="2" opacity="0.7" transform="rotate(300,260,255)"/>
  </g>

  <!-- main spinning ring -->
  <g class="sg">
    <circle cx="260" cy="255" r="133" fill="none" stroke="url(#g1)" stroke-width="3" stroke-dasharray="20 6 4 6" opacity="0.9" filter="url(#glow)"/>
  </g>

  <!-- 3 orbiting glowing dots -->
  <circle cx="260" cy="255" r="7" fill="#0071e3" filter="url(#glow)" class="d1"/>
  <circle cx="260" cy="255" r="5" fill="#5ac8fa" filter="url(#glow)" class="d2"/>
  <circle cx="260" cy="255" r="6" fill="#5856D6" filter="url(#glow)" class="d3"/>

  <!-- pulsing glow ring (where photo sits) -->
  <circle cx="260" cy="255" fill="none" stroke="#0071e3" stroke-width="5" filter="url(#glow)">
    <animate attributeName="r"       values="113;119;113" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.35;0.8;0.35" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- inner radial glow — the core -->
  <circle cx="260" cy="255" r="110" fill="url(#core)"/>

  <!-- gradient border -->
  <circle cx="260" cy="255" r="110" fill="none" stroke="url(#g1)" stroke-width="3.5" filter="url(#gs)"/>

  <!-- AI text in the center -->
  <text x="260" y="242" font-size="48" font-weight="800" fill="#0071e3" text-anchor="middle" opacity="0.25" filter="url(#glow)" letter-spacing="-2">AI</text>
  <text x="260" y="270" font-size="11" font-weight="500" fill="#5ac8fa" text-anchor="middle" opacity="0.5" letter-spacing="4">ENGINEER</text>

  <!-- floating tags -->
  <g class="t1" transform="translate(44,62)">
    <rect rx="8" width="96" height="26" fill="#0071e3" opacity="0.15" stroke="#0071e3" stroke-width="1" stroke-opacity="0.6"/>
    <text x="48" y="17" font-size="11" font-weight="600" fill="#5ac8fa" text-anchor="middle">LangGraph</text>
  </g>
  <g class="t2" transform="translate(374,52)">
    <rect rx="8" width="84" height="26" fill="#5856D6" opacity="0.15" stroke="#5856D6" stroke-width="1" stroke-opacity="0.6"/>
    <text x="42" y="17" font-size="11" font-weight="600" fill="#a78bfa" text-anchor="middle">Hybrid RAG</text>
  </g>
  <g class="t3" transform="translate(12,238)">
    <rect rx="8" width="76" height="26" fill="#059669" opacity="0.15" stroke="#34C759" stroke-width="1" stroke-opacity="0.6"/>
    <text x="38" y="17" font-size="11" font-weight="600" fill="#34C759" text-anchor="middle">FastAPI</text>
  </g>
  <g class="t4" transform="translate(424,236)">
    <rect rx="8" width="68" height="26" fill="#0071e3" opacity="0.15" stroke="#0071e3" stroke-width="1" stroke-opacity="0.6"/>
    <text x="34" y="17" font-size="11" font-weight="600" fill="#5ac8fa" text-anchor="middle">MCP</text>
  </g>
  <g class="t5" transform="translate(30,382)">
    <rect rx="8" width="88" height="26" fill="#5856D6" opacity="0.15" stroke="#5856D6" stroke-width="1" stroke-opacity="0.6"/>
    <text x="44" y="17" font-size="11" font-weight="600" fill="#a78bfa" text-anchor="middle">DeepSeek</text>
  </g>
  <g class="t6" transform="translate(382,380)">
    <rect rx="8" width="76" height="26" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.6"/>
    <text x="38" y="17" font-size="11" font-weight="600" fill="#fbbf24" text-anchor="middle">Python</text>
  </g>

  <!-- name + title -->
  <text x="260" y="418" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="-0.5">Chandan Kumar</text>
  <text x="260" y="443" font-size="13" font-weight="500" fill="#0071e3" text-anchor="middle" letter-spacing="1.5">SENIOR AI ENGINEER</text>

  <!-- animated underline -->
  <rect x="260" y="451" height="2" rx="1" fill="url(#g1)">
    <animate attributeName="width" values="0;160;0"     dur="3s" repeatCount="indefinite"/>
    <animate attributeName="x"     values="260;180;260" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- tagline -->
  <text x="260" y="480" font-size="10.5" font-weight="400" fill="#6e6e73" text-anchor="middle" letter-spacing="0.5">Building AI systems that survive production reality</text>
</svg>
